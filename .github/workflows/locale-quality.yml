name: Locale Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  locale-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run locale quality gate
        run: yarn ci:locale-quality
